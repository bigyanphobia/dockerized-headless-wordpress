name: Deploy to Toshiba Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important for proper git history

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<'EOF'
          Host lan-server
            HostName 100.104.235.63
            User bigyan
            Port 2222
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy to Server
        run: |
          ssh lan-server "cd ~/wordpress && git fetch origin && git reset --hard origin/main"

          # Optional but recommended: Clear some caches before restart
          ssh lan-server "cd ~/wordpress && rm -rf wp-content/cache/* || true"

          # Restart Docker services
          ssh lan-server "cd ~/wordpress && docker compose pull"
          ssh lan-server "cd ~/wordpress && docker compose up -d --remove-orphans --force-recreate"

      - name: Verify deployment
        run: |
          ssh lan-server "docker compose -f ~/wordpress/docker-compose.yml ps"
          ssh lan-server "docker compose -f ~/wordpress/docker-compose.yml logs --tail=20"
