name: Deploy to LAN Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<'EOF'
          Host lan-server
            HostName 100.104.235.63
            User bigyan
            Port 2222
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config

      - name: Sync and deploy
        run: |
          sudo apt-get update -y
          sudo apt-get install -y rsync openssh-client
          rsync -av --delete ./wp-content/ lan-server:/home/bigyan/wordpress/wp-content/
          ssh lan-server "cd ~/wordpress && git pull origin main"
          ssh lan-server "cd ~/wordpress && docker compose restart wordpress"
          ssh lan-server "docker compose -f ~/wordpress/docker-compose.yml ps"
